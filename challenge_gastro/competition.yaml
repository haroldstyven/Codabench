# GastroCorp NER 2026 Challenge
# Learn more here: https://docs.codabench.org/latest/Organizers/Benchmark_Creation/Yaml-Structure/
title: GastroCorp NER 2026
version: 2
description: "GastroCorp NER 2026 is a shared task on Named Entity Recognition over a bilingual (Spanish–English) gastronomic corpus."
image: logo.png
registration_auto_approve: True
docker_image: codalab/codalab-legacy:py312
enable_detailed_results: True
make_programs_available: false
make_input_data_available: false

# Documentation web pages
terms: pages/terms.md
pages:
  - title: Overview
    file: pages/overview.md
  - title: Data
    file: pages/data.md
  - title: Evaluation
    file: pages/evaluation.md
  - title: Organization
    file: pages/organization.md

# Definition of the tasks (result submission - no ingestion program needed)
tasks:
- index: 0
  name: Named Entity Recognition
  description: 'Assign an IOB2 entity label to each token from a gastronomic text.'
  is_public: false
  reference_data: reference_data.zip
  scoring_program: scoring_program.zip

# Single phase challenge
phases:
- index: 0
  name: Challenge
  description: 'Participants submit their predictions. The leaderboard is public and updated in real time. 5 submissions per day and 100 submissions in total.'
  start: 4-5-2026
  end: 4-30-2026
  max_submissions_per_day: 5
  max_submissions: 100
  execution_time_limit: 300
  tasks:
  - 0
  solutions: []

# Leaderboard
leaderboards:
- index: 0
  title: Results
  key: Results
  submission_rule: "Force_Last"
  columns:
      - title: Micro F1
        key: micro_f1
        index: 0
        sorting: desc
